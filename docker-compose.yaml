#Without this file, you would have to manually install the Selenium Hub, 
#then manually install Chrome and Firefox drivers, and ensure all versions match perfectly.

#With the YAML file: You, your teammates, or a Jenkins server can run the exact same environment with a single command.
#It guarantees that the versions of Chrome and Firefox are identical every time

version: '3'

services:
  selenium-hub:
    image: selenium/hub
    ports:
      - "4442-4444:4442-4444"
    networks:
      - grid

  node-chrome:
    image: selenium/node-chrome
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - grid
    depends_on:
      - selenium-hub

  node-firefox:
    image: selenium/node-firefox
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - grid
    depends_on:
      - selenium-hub

networks:
  grid:
    driver: bridge